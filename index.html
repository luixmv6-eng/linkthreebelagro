<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BELAGRO — fertilizamos con inteligencia</title>
  <style>
    @font-face {
      font-family: 'Salzburg';
      src: url('Salzburg-Regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <style>
    :root {
      --purple:   #815899;
      --purple-l: #beaacf;
      --orange:   #e47828;
      --orange-l: #f3bf93;
      --green:    #73b548;
      --green-l:  #b8dfa0;
      --bg:       #faf8f5;
      --surface:  rgba(255,255,255,0.78);
      --border:   rgba(0,0,0,0.07);
      --text:     #1e1b2e;
      --muted:    rgba(30,27,46,0.44);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      font-family: 'Salzburg', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(28px, 6vw, 56px) clamp(16px, 4vw, 24px);
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    /* ══ Morphing blobs ══ */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(72px);
      opacity: 0.62;
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
      will-change: transform, border-radius;
    }

    .blob-purple {
      background: var(--purple-l);
      width: clamp(280px, 48vw, 520px);
      height: clamp(280px, 48vw, 520px);
      top: -12%;
      left: -14%;
      animation: morph1 11s ease-in-out infinite;
    }
    .blob-orange {
      background: var(--orange-l);
      width: clamp(240px, 42vw, 440px);
      height: clamp(240px, 42vw, 440px);
      bottom: -8%;
      right: -12%;
      animation: morph2 13s ease-in-out infinite;
    }
    .blob-green {
      background: var(--green-l);
      width: clamp(200px, 36vw, 380px);
      height: clamp(200px, 36vw, 380px);
      top: 38%;
      left: 52%;
      animation: morph3 15s ease-in-out infinite;
    }

    @keyframes morph1 {
      0%,100% { border-radius:60% 40% 30% 70%/60% 30% 70% 40%; transform:translate(0,0)   scale(1);    }
      25%      { border-radius:30% 60% 70% 40%/50% 60% 30% 60%; transform:translate(35px,-25px) scale(1.06); }
      50%      { border-radius:50% 60% 30% 60%/30% 40% 60% 70%; transform:translate(-15px,40px) scale(0.94); }
      75%      { border-radius:40% 60% 60% 40%/70% 30% 50% 60%; transform:translate(20px,10px) scale(1.03); }
    }
    @keyframes morph2 {
      0%,100% { border-radius:40% 60% 60% 40%/60% 30% 70% 40%; transform:translate(0,0)    scale(1);    }
      33%      { border-radius:60% 40% 30% 70%/40% 60% 40% 60%; transform:translate(-25px,-18px) scale(1.08); }
      66%      { border-radius:50% 50% 50% 50%/50% 50% 50% 50%; transform:translate(12px,-30px) scale(0.92); }
    }
    @keyframes morph3 {
      0%,100% { border-radius:30% 70% 70% 30%/30% 30% 70% 70%; transform:translate(0,0)   scale(1);    }
      33%      { border-radius:70% 30% 30% 70%/70% 70% 30% 30%; transform:translate(-20px,18px) scale(1.07); }
      66%      { border-radius:40% 60% 60% 40%/50% 60% 40% 50%; transform:translate(28px,-12px) scale(0.96); }
    }

    /* ══ Particle canvas ══ */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ══ Layout ══ */
    .page {
      position: relative;
      z-index: 2;
      width: min(420px, 100%);
    }

    /* ══ Header ══ */
    .header {
      text-align: center;
      margin-bottom: clamp(32px, 7vw, 44px);
    }

    /* Logo area */
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: clamp(22px, 5vw, 30px);
      animation: bounceIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Outer dashed ring — counter-spin */
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 2px dashed rgba(115,181,72,0.45);
      animation: spinCCW 22s linear infinite;
    }

    /* Outer dotted accent ring */
    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -32px;
      border-radius: 50%;
      border: 2px dotted rgba(228,120,40,0.3);
      animation: spinCW 30s linear infinite;
    }

    /* Conic gradient ring */
    .ring-mid {
      position: absolute;
      inset: -11px;
      border-radius: 50%;
      background: conic-gradient(
        var(--purple)   0deg,
        var(--purple-l) 60deg,
        var(--orange)   120deg,
        var(--orange-l) 180deg,
        var(--green)    240deg,
        var(--green-l)  300deg,
        var(--purple)   360deg
      );
      animation: spinCW 7s linear infinite;
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
      opacity: 0.85;
    }

    /* Glow halo */
    .ring-glow {
      position: absolute;
      inset: -36px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(129,88,153,0.18) 0%, rgba(228,120,40,0.09) 50%, transparent 70%);
      animation: breathe 3.5s ease-in-out infinite;
    }

    @keyframes spinCW  { to { transform: rotate(360deg);  } }
    @keyframes spinCCW { to { transform: rotate(-360deg); } }
    @keyframes breathe {
      0%,100% { transform: scale(0.88); opacity: 0.55; }
      50%      { transform: scale(1.12); opacity: 1;    }
    }
    @keyframes bounceIn {
      0%   { opacity:0; transform:scale(0.45) translateY(22px); }
      55%  { opacity:1; transform:scale(1.1)  translateY(-6px); }
      75%  { transform:scale(0.96) translateY(3px); }
      100% { transform:scale(1)    translateY(0);   }
    }

    .logo-wrap img {
      width: clamp(86px, 21vw, 114px);
      height: auto;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 16px rgba(129,88,153,0.18));
      animation: floatY 5s ease-in-out infinite 0.9s;
    }
    @keyframes floatY {
      0%,100% { transform: translateY(0);   }
      50%      { transform: translateY(-8px); }
    }

    /* Title — chars split by JS */
    .brand-name {
      font-size: clamp(2.2rem, 7.5vw, 2.8rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 9px;
    }
    .brand-name .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(22px) rotate(5deg);
      animation: charDrop 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes charDrop {
      to { opacity: 1; transform: translateY(0) rotate(0deg); }
    }

    .brand-tag {
      font-size: clamp(0.72rem, 2.2vw, 0.8rem);
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s 0.85s ease forwards;
    }

    /* ══ Tricolor rule with fill-in animation ══ */
    .rule {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      height: 3px;
      gap: 4px;
      margin-bottom: clamp(28px, 6vw, 36px);
    }
    .rule span {
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left;
      animation: fillBar 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .rule span:nth-child(1) { background: var(--purple); animation-delay: 0.75s; }
    .rule span:nth-child(2) { background: var(--orange); animation-delay: 0.9s;  }
    .rule span:nth-child(3) { background: var(--green);  animation-delay: 1.05s; }
    @keyframes fillBar { to { transform: scaleX(1); } }

    /* ══ Buttons ══ */
    .links {
      display: flex;
      flex-direction: column;
      gap: clamp(9px, 2vw, 12px);
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: clamp(13px, 3vw, 16px);
      padding: clamp(15px, 3.5vw, 18px) clamp(17px, 4vw, 22px);
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--text);
      text-decoration: none;
      font-family: 'Salzburg', sans-serif;
      font-size: clamp(0.9rem, 2.4vw, 0.97rem);
      font-weight: 500;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      opacity: 0;
      transform: translateY(22px);
      animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
      transition:
        transform    0.3s cubic-bezier(0.22,1,0.36,1),
        box-shadow   0.3s ease,
        border-color 0.3s ease,
        background   0.3s ease;
    }

    .link-btn:nth-child(1) { animation-delay: 0.9s;  }
    .link-btn:nth-child(2) { animation-delay: 1.0s;  }
    .link-btn:nth-child(3) { animation-delay: 1.1s;  }
    .link-btn:nth-child(4) { animation-delay: 1.2s;  }

    @keyframes slideUp { to { opacity:1; transform:translateY(0); } }

    /* Shimmer sweep */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
      transform: translateX(-220%);
      transition: transform 0.65s ease;
    }
    .link-btn:hover::before { transform: translateX(220%); }

    /* Left accent bar */
    .link-btn::after {
      content: '';
      position: absolute;
      left: 0;
      top: 22%;
      bottom: 22%;
      width: 3.5px;
      border-radius: 0 3px 3px 0;
      transition: top 0.3s ease, bottom 0.3s ease;
    }
    .link-btn:hover::after { top: 0; bottom: 0; }

    /* LinkedIn — purple */
    .link-linkedin::after { background: var(--purple); }
    .link-linkedin:hover {
      transform: translateY(-4px);
      border-color: rgba(129,88,153,0.28);
      background: rgba(190,170,207,0.18);
      box-shadow: 0 14px 44px rgba(129,88,153,0.18), 0 4px 12px rgba(129,88,153,0.1);
    }

    /* WhatsApp — green */
    .link-wa::after { background: var(--green); }
    .link-wa:hover {
      transform: translateY(-4px);
      border-color: rgba(115,181,72,0.28);
      background: rgba(184,223,160,0.18);
      box-shadow: 0 14px 44px rgba(115,181,72,0.16), 0 4px 12px rgba(115,181,72,0.1);
    }

    /* Web — orange */
    .link-web::after { background: var(--orange); }
    .link-web:hover {
      transform: translateY(-4px);
      border-color: rgba(228,120,40,0.28);
      background: rgba(243,191,147,0.18);
      box-shadow: 0 14px 44px rgba(228,120,40,0.16), 0 4px 12px rgba(228,120,40,0.1);
    }

    .link-btn:active { transform: translateY(-1px) scale(0.985); }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      opacity: 0.12;
      animation: rippleOut 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleOut { to { transform: scale(4.5); opacity: 0; } }

    /* Icon */
    .icon {
      width: clamp(40px, 9.5vw, 46px);
      height: clamp(40px, 9.5vw, 46px);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
    }
    .link-btn:hover .icon { transform: rotate(-10deg) scale(1.14); }
    .icon svg { width: 20px; height: 20px; display: block; }

    .icon-li  { background: rgba(129,88,153,0.12); }
    .icon-wa  { background: rgba(115,181,72,0.11);  }
    .icon-web { background: rgba(228,120,40,0.11);  }

    /* Labels */
    .lbl { flex: 1; min-width: 0; }
    .lbl-main {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lbl-sub {
      display: block;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Arrow */
    .arr {
      flex-shrink: 0;
      color: rgba(30,27,46,0.28);
      transition: color 0.3s ease;
    }
    .link-btn:hover .arr {
      color: var(--text);
      animation: arrBounce 0.42s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes arrBounce {
      0%   { transform: translateX(0); }
      45%  { transform: translateX(9px); }
      70%  { transform: translateX(3px); }
      100% { transform: translateX(6px); }
    }

    /* ══ Footer ══ */
    .footer {
      margin-top: clamp(28px, 6vw, 36px);
      text-align: center;
      font-size: clamp(0.68rem, 1.8vw, 0.74rem);
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s 1.45s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══ Responsive ══ */
    @media (max-width: 480px) { body { align-items: flex-start; } }

    @media (hover: none) and (pointer: coarse) {
      .link-btn:hover {
        transform: none;
        border-color: var(--border);
        background: var(--surface);
        box-shadow: 0 2px 14px rgba(0,0,0,0.06);
      }
      .link-btn:hover::before { transform: translateX(-220%); }
      .link-btn:hover .icon   { transform: none; }
      .link-btn:active        { transform: scale(0.97); }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      .logo-wrap img { width: 64px; }
      .header { margin-bottom: 18px; }
      .links { gap: 7px; }
      .link-btn { padding: 11px 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>

          <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
        </svg>
      </a>

      <!-- Web -->
      <a class="link-btn link-web"
         href="https://www.belagro.com.co/"
         target="_blank" rel="noopener noreferrer">
        <div class="icon icon-web">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e47828" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>

          </svg>
        </div>
        <div class="lbl">
          <span class="lbl-main">Página Web</span>
          <span class="lbl-sub">belagro.com.co</span>

        <svg class="arr" viewBox="0 0 20 20" fill="currentColor" width="15" height="15" aria-hidden="true">

  </div>

  <script>
    /* ── Char-split animation on "Belagro" ── */
    (function () {
      const el = document.getElementById('brandName');
      const txt = el.textContent.trim();
      el.textContent = '';
      txt.split('').forEach((ch, i) => {
        const s = document.createElement('span');
        s.className = 'char';
        s.textContent = ch === ' ' ? ' ' : ch;
        s.style.animationDelay = (0.28 + i * 0.07) + 's';
        el.appendChild(s);
      });
    })();

    /* ── Ripple on click ── */
    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('pointerdown', function (e) {
        const r   = this.getBoundingClientRect();
        const sz  = Math.max(r.width, r.height);
        const x   = e.clientX - r.left  - sz / 2;
        const y   = e.clientY - r.top   - sz / 2;
        const rip = document.createElement('div');
        rip.className = 'ripple';
        rip.style.cssText = `width:${sz}px;height:${sz}px;left:${x}px;top:${y}px;background:currentColor`;
        this.appendChild(rip);
        rip.addEventListener('animationend', () => rip.remove());
      });
    });

    /* ── Floating particles ── */
    (function () {
      const canvas = document.getElementById('particles');
      const ctx    = canvas.getContext('2d');
      const cols   = ['#815899','#e47828','#73b548','#beaacf','#f3bf93','#b8dfa0'];
      let W, H, pts = [], raf;

      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function mkPt() {
        return {
          x:     Math.random() * W,
          y:     H + 8,
          r:     1.5 + Math.random() * 3.5,
          vy:    -(0.35 + Math.random() * 0.9),
          vx:    (Math.random() - 0.5) * 0.35,
          alpha: 0.45 + Math.random() * 0.45,
          color: cols[Math.floor(Math.random() * cols.length)],
          life:  1,
          decay: 0.0025 + Math.random() * 0.004,
        };
      }

      function tick() {
        ctx.clearRect(0, 0, W, H);
        if (!reduced) {
          if (pts.length < 40 && Math.random() < 0.4) pts.push(mkPt());
          for (let i = pts.length - 1; i >= 0; i--) {
            const p = pts[i];
            p.x += p.vx; p.y += p.vy; p.life -= p.decay;
            if (p.life <= 0 || p.y < -12) { pts.splice(i, 1); continue; }
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life * p.alpha;
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
        raf = requestAnimationFrame(tick);
      }

      resize();
      tick();
      window.addEventListener('resize', resize);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(raf);
        else raf = requestAnimationFrame(tick);
      });
    })();
  </script>
